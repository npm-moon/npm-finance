<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="NPM 자산관리"/>
<title>NPM 자산관리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f0ede4;color:#1a2620;min-height:100vh}
input,button,select{font-family:inherit}

/* 로그인 */
#pwScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(160deg,#0f3d28,#1a7a4c)}
.pw-logo{font-size:44px;margin-bottom:10px}
.pw-title{color:#fff;font-size:22px;font-weight:600;margin-bottom:4px}
.pw-sub{color:rgba(255,255,255,.7);font-size:13px;margin-bottom:32px}
.pw-inp{width:100%;max-width:300px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:13px 16px;color:#fff;font-size:15px;outline:none;margin-bottom:8px}
.pw-inp::placeholder{color:rgba(255,255,255,.45);font-size:14px}
.pw-btn{width:100%;max-width:300px;background:#fff;color:#0f3d28;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:600;cursor:pointer}
.pw-err{color:#ffb3a0;font-size:13px;margin-top:10px;min-height:18px}

/* 앱 */
#app{display:none;padding-bottom:calc(62px + env(safe-area-inset-bottom,0px))}
.header{position:sticky;top:0;z-index:50;background:#f0ede4;border-bottom:1px solid #e3ddd0;padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center}
.header-left .eye{font-size:11px;letter-spacing:.14em;color:#1a7a4c;font-weight:700;text-transform:uppercase}
.header-left .title{font-size:20px;font-weight:600;color:#0f3d28;margin-top:1px}
.logout-btn{background:none;border:1px solid #d0cfc8;border-radius:8px;padding:5px 10px;font-size:12px;color:#5a6a60;cursor:pointer}

.tab-content{padding:14px 14px 0}
.section{display:none}.section.active{display:block}

/* 카드 */
.card{background:#fff;border-radius:14px;padding:14px 14px;border:1px solid #e3ddd0;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:#0f3d28;margin-bottom:10px}

/* 히어로 */
.hero{background:linear-gradient(135deg,#0f3d28,#1a7a4c);border-radius:16px;padding:18px;color:#fff;margin-bottom:12px}
.hero .lbl{font-size:12px;opacity:.78;letter-spacing:.04em}
.hero .big{font-size:34px;font-weight:600;letter-spacing:-.02em;margin:4px 0 12px}
.hero .row{display:flex;gap:18px;flex-wrap:wrap}
.hero .item .hl{font-size:11px;opacity:.72}
.hero .item .hv{font-size:17px;font-weight:600}

/* 카테고리 섹션 */
.cat-hdr{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#1a7a4c;font-weight:700;margin:14px 0 6px 2px}
.acct-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:.5px solid #e3ddd0}
.acct-row:last-child{border-bottom:none}
.acct-left{display:flex;align-items:center;gap:8px}
.acct-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.acct-name{font-size:13px}
.acct-amt{font-size:13px;font-weight:600}
.acct-sub{font-size:11px;color:#9aa89f}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:500}
.badge-expired{background:#fde8e0;color:#b5482e}
.badge-new{background:#e8f5ee;color:#1a7a4c}

/* 입력 */
.inp-field{width:100%;padding:10px 12px;border:1px solid #e3ddd0;border-radius:8px;font-size:14px;background:#f9f7f2;color:#1a2620}
.inp-field:focus{outline:none;border-color:#1a7a4c}
.inp-group{margin-bottom:10px}
.inp-label{font-size:12px;color:#5a6a60;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.inp-label span{font-size:11px;color:#9aa89f}
.save-btn{width:100%;padding:14px;background:#0f3d28;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer}
.save-btn.ok{background:#1a7a4c}
.add-acct-btn{width:100%;padding:10px;border:1.5px dashed #c9d6cd;border-radius:10px;background:transparent;color:#5a6a60;font-size:13px;cursor:pointer;margin-top:6px}
.status-sel{font-size:11px;border:1px solid #e3ddd0;border-radius:6px;padding:2px 6px;color:#5a6a60;background:#fff;cursor:pointer}

/* 추이 */
.chart-wrap{position:relative;width:100%;height:200px}
.period-tab{display:flex;gap:6px;margin-bottom:10px}
.ptab{padding:5px 12px;border-radius:20px;border:1px solid #e3ddd0;background:#fff;font-size:12px;cursor:pointer;color:#5a6a60}
.ptab.on{background:#0f3d28;color:#fff;border-color:#0f3d28}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{text-align:left;padding:7px 6px;color:#5a6a60;font-weight:500;border-bottom:1.5px solid #e3ddd0}
.tbl td{padding:8px 6px;border-bottom:.5px solid #e3ddd0}
.tbl tr:nth-child(even) td{background:#f9f7f2}
.up{color:#1a7a4c;font-weight:600}
.dn{color:#b5482e;font-weight:600}
.strike{text-decoration:line-through;opacity:.5}

/* 할일 */
.progress-bar{flex:1;background:#e3ddd0;border-radius:20px;height:7px;overflow:hidden}
.progress-fill{background:#1a7a4c;height:100%;border-radius:20px;transition:width .4s}
.todo-row{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:.5px solid #e3ddd0;cursor:pointer}
.todo-row:last-child{border-bottom:none}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid #e3ddd0;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px;font-weight:700}
.chk.done{background:#1a7a4c;border-color:#1a7a4c;color:#fff}
.todo-txt{flex:1;font-size:13px;line-height:1.45}
.todo-txt.done{text-decoration:line-through;opacity:.45}
.tag-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px}
.tag-lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#5a6a60;font-weight:600;margin:12px 0 6px 2px}

/* 바텀 탭 */
#nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e3ddd0;display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:10px 0 7px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#5a6a60;border-top:2px solid transparent}
.nav-btn.on{color:#1a7a4c;border-top-color:#1a7a4c}
.nav-btn.on .nav-lbl{font-weight:600}
.nav-icon{font-size:19px}
.nav-lbl{font-size:10.5px}

.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:#0f3d28;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.loading{text-align:center;padding:40px;color:#9aa89f;font-size:14px}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:24px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:5px;border-radius:4px;background:#d9e2db}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#1a7a4c;margin-top:-9.5px;box-shadow:0 2px 6px rgba(15,61,40,.35)}
input[type=range]::-moz-range-track{height:5px;border-radius:4px;background:#d9e2db}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border:none;border-radius:50%;background:#1a7a4c}
</style>
</head>
<body>

<div id="pwScreen">
  <div class="pw-logo">💰</div>
  <div class="pw-title">NPM 자산관리</div>
  <div class="pw-sub">문쌤 개인 재무 대시보드</div>
  <input class="pw-inp" type="email" id="emailInp" placeholder="이메일"/>
  <input class="pw-inp" type="password" id="pwInp" placeholder="비밀번호" maxlength="30"/>
  <button class="pw-btn" onclick="login()" id="loginBtn">로그인</button>
  <div class="pw-err" id="pwErr"></div>
</div>

<div id="app">
  <div class="header">
    <div class="header-left">
      <div class="eye">NPM 자산관리</div>
      <div class="title" id="hTitle">자산 현황</div>
    </div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </div>
  <div class="tab-content">
    <div class="section active" id="sec-home"><div class="loading">불러오는 중…</div></div>
    <div class="section" id="sec-trend"><div class="loading">불러오는 중…</div></div>
    <div class="section" id="sec-sim"><div class="loading">불러오는 중…</div></div>
    <div class="section" id="sec-input"><div class="loading">불러오는 중…</div></div>
    <div class="section" id="sec-todo"><div class="loading">불러오는 중…</div></div>
  </div>
  <nav id="nav">
    <button class="nav-btn on" onclick="go('home',this)"><span class="nav-icon">📊</span><span class="nav-lbl">홈</span></button>
    <button class="nav-btn" onclick="go('trend',this)"><span class="nav-icon">📈</span><span class="nav-lbl">추이</span></button>
    <button class="nav-btn" onclick="go('sim',this)"><span class="nav-icon">🏖️</span><span class="nav-lbl">시뮬</span></button>
    <button class="nav-btn" onclick="go('input',this)"><span class="nav-icon">✏️</span><span class="nav-lbl">입력</span></button>
    <button class="nav-btn" onclick="go('todo',this)"><span class="nav-icon">✅</span><span class="nav-lbl">할일</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ── 설정 ─────────────────────────────────
const SB = {
  url: 'https://doptimiubvjiwnjkznxj.supabase.co',
  key: 'sb_publishable_NgBxcUcjcutamlnQe-mI8w_5TGfZPIc',
};
let token = sessionStorage.getItem('npm_tok') || null;

// ── API ──────────────────────────────────
const H = () => ({ 'apikey':SB.key, 'Authorization':'Bearer '+(token||SB.key), 'Content-Type':'application/json', 'Prefer':'return=representation' });
const api = {
  get:    (t,q='')    => fetch(`${SB.url}/rest/v1/${t}?${q}`,{headers:H()}).then(r=>r.json()),
  post:   (t,d)       => fetch(`${SB.url}/rest/v1/${t}`,{method:'POST',headers:H(),body:JSON.stringify(d)}).then(r=>r.json()),
  patch:  (t,q,d)     => fetch(`${SB.url}/rest/v1/${t}?${q}`,{method:'PATCH',headers:H(),body:JSON.stringify(d)}).then(r=>r.json()),
  upsert: (t,d)       => fetch(`${SB.url}/rest/v1/${t}`,{method:'POST',headers:{...H(),'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(d)}).then(r=>r.json()),
  del:    (t,q)       => fetch(`${SB.url}/rest/v1/${t}?${q}`,{method:'DELETE',headers:H()}),
};

// ── 유틸 ─────────────────────────────────
const CAT_LABEL = {cash:'현금·예적금', investment:'투자', pension:'연금·공제', stocks:'주식', bonds:'채권', loan:'대출'};
const CAT_COLOR = {cash:'#6dbb90', investment:'#0f3d28', pension:'#7aa8d8', stocks:'#caa94a', bonds:'#1a7a4c', loan:'#b5482e'};
const won = n => Math.round((+n||0)/1e4).toLocaleString('ko-KR') + '만';
const eok = n => ((+n||0)/1e8).toFixed(2);
const toast = msg => { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); };
const titles = {home:'자산 현황', trend:'월별 변화 추이', sim:'노후 시뮬레이터', input:'계좌별 입력', todo:'액션 플랜'};

// ── 상태 ─────────────────────────────────
let accounts = [], snapshots = {}, loans = [], charts = {};
let currentDate = new Date().toISOString().slice(0,10);

// ── 로그인 ───────────────────────────────
async function login() {
  const email = document.getElementById('emailInp').value.trim();
  const pw = document.getElementById('pwInp').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('pwErr');
  if(!email||!pw){err.textContent='이메일과 비밀번호를 입력해주세요';return;}
  btn.textContent='로그인 중…'; btn.disabled=true;
  try {
    const r = await fetch(`${SB.url}/auth/v1/token?grant_type=password`,{
      method:'POST', headers:{'apikey':SB.key,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pw})
    });
    const d = await r.json();
    if(d.access_token){
      token=d.access_token; sessionStorage.setItem('npm_tok',token);
      document.getElementById('pwScreen').style.display='none';
      document.getElementById('app').style.display='block';
      await init();
    } else { err.textContent='이메일 또는 비밀번호가 틀렸습니다'; btn.textContent='로그인'; btn.disabled=false; }
  } catch(e){ err.textContent='오류가 발생했습니다'; btn.textContent='로그인'; btn.disabled=false; }
}
async function logout() {
  await fetch(`${SB.url}/auth/v1/logout`,{method:'POST',headers:{'apikey':SB.key,'Authorization':'Bearer '+token}});
  sessionStorage.removeItem('npm_tok'); token=null;
  document.getElementById('app').style.display='none';
  document.getElementById('pwScreen').style.display='flex';
}
document.getElementById('pwInp').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
if(token){document.getElementById('pwScreen').style.display='none';document.getElementById('app').style.display='block';}

// ── 초기 로드 ────────────────────────────
async function init() {
  try {
    accounts = await api.get('accounts_master','order=sort_order.asc');
    const snaps = await api.get('account_snapshots','order=snapshot_date.asc');
    const ls = await api.get('loan_snapshots','order=snapshot_date.asc');
    loans = ls;
    // 날짜별로 그룹화
    snapshots = {};
    for(const s of snaps){
      if(!snapshots[s.snapshot_date]) snapshots[s.snapshot_date] = {};
      snapshots[s.snapshot_date][s.account_name] = {amount:s.amount, status:s.status};
    }
    renderHome();
  } catch(e){ console.error('init error',e); }
}

// ── 탭 전환 ──────────────────────────────
function go(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sec-'+id).classList.add('active');
  btn.classList.add('on');
  document.getElementById('hTitle').textContent = titles[id];
  if(id==='home') renderHome();
  if(id==='trend') renderTrend();
  if(id==='sim') renderSim();
  if(id==='input') renderInput();
  if(id==='todo') renderTodo();
}

// ── 집계 헬퍼 ────────────────────────────
function totalForDate(dt) {
  const s = snapshots[dt]||{};
  return Object.values(s).reduce((a,v)=>a+(+v.amount||0),0);
}
function catTotalForDate(dt, cat) {
  const s = snapshots[dt]||{};
  return accounts.filter(a=>a.category===cat).reduce((sum,a)=>{
    return sum + (+( (s[a.name]||{}).amount||0));
  },0);
}
function latestDate() {
  const dates = Object.keys(snapshots).sort();
  return dates[dates.length-1] || null;
}
function allDates() { return Object.keys(snapshots).sort(); }
function loanForDate(dt) {
  const l = loans.find(x=>x.snapshot_date===dt);
  return l ? +l.amount : 0;
}

// ── 홈 화면 ──────────────────────────────
function renderHome() {
  const dt = latestDate();
  if(!dt){ document.getElementById('homeContent')?.remove(); return; }
  const tot = totalForDate(dt);
  const loan = loanForDate(dt);
  const net = tot - loan;
  const s = snapshots[dt]||{};

  const cats = ['cash','investment','pension','stocks','bonds'];
  let html = `
    <div class="hero">
      <div class="lbl">총 자산 · ${dt}</div>
      <div class="big">${eok(tot)}억</div>
      <div class="row">
        <div class="item"><div class="hl">순자산</div><div class="hv">${eok(net)}억</div></div>
        <div class="item"><div class="hl">대출</div><div class="hv">${eok(loan)}억</div></div>
      </div>
    </div>`;

  for(const cat of cats){
    const catAccts = accounts.filter(a=>a.category===cat);
    if(!catAccts.length) continue;
    const catTotal = catAccts.reduce((sum,a)=>sum+(+((s[a.name]||{}).amount||0)),0);
    if(catTotal===0) continue;
    html += `<div class="cat-hdr">${CAT_LABEL[cat]} <span style="color:#9aa89f;font-weight:400;text-transform:none;letter-spacing:0">${won(catTotal)}원</span></div>`;
    html += `<div class="card">`;
    for(const a of catAccts){
      const info = s[a.name]||{};
      const amt = +info.amount||0;
      if(amt===0) continue;
      const expired = info.status==='만기해지';
      html += `<div class="acct-row">
        <div class="acct-left">
          <div class="acct-dot" style="background:${CAT_COLOR[cat]}"></div>
          <span class="acct-name ${expired?'strike':''}">${a.name}</span>
          ${expired?'<span class="badge badge-expired">만기해지</span>':''}
        </div>
        <div class="acct-amt">${won(amt)}원</div>
      </div>`;
    }
    html += `</div>`;
  }
  document.getElementById('sec-home').innerHTML = html;
}


// ── 노후 시뮬 ────────────────────────────
const START_BAL=277732828, SIM_AGE0=41, SIM_YEAR0=2026, SIM_PENSION_AGE=65, SIM_PENSION=33600000, SIM_SG=0.03;
let simSet = {retire_age:52, save_monthly:490, return_rate:4.0, inflation:2.5, living_active:400, living_slow:360, living_old:300, alba:100};
let simChartObj = null;

function simulate(s) {
  const r=s.return_rate/100, f=s.inflation/100;
  const living = a => (a<=64?s.living_active:a<=74?s.living_slow:s.living_old)*1e4*12;
  let bal=START_BAL, dep=null, rows=[];
  const AGES=[45,50,52,55,60,65,70,75,80,86];
  for (let age=SIM_AGE0; age<=86; age++) {
    const yr=SIM_YEAR0+(age-SIM_AGE0); bal*=(1+r);
    if(age<=s.retire_age) bal+=s.save_monthly*1e4*12*(1+SIM_SG)**(age-SIM_AGE0);
    else {
      bal-=living(age)*(1+f)**(yr-2024);
      if(age<=64) bal+=s.alba*1e4*12;
      if(age>=SIM_PENSION_AGE) bal+=SIM_PENSION;
    }
    if(bal<0&&dep===null) dep=age;
    if(AGES.includes(age)) rows.push({age, bal:parseFloat((bal/1e8).toFixed(2))});
  }
  return {dep, rows, end:rows[rows.length-1].bal, peak:Math.max(...rows.map(r=>r.bal))};
}

let simRealView = false;

function renderSim() {
  const s = simSet;
  const sim = simulate(s);
  const ok = sim.dep===null;

  // 시나리오 비교 (수익률 -1%, 현재, +1%)
  const simLow = simulate({...s, return_rate: Math.max(1, s.return_rate-1)});
  const simHigh = simulate({...s, return_rate: Math.min(8, s.return_rate+1)});

  // 역산: 86세까지 필요 수익률
  function solveReturnRate() {
    let lo=0, hi=0.15;
    for(let i=0;i<60;i++){
      const m=(lo+hi)/2;
      if(simulate({...s,return_rate:m*100}).dep===null) hi=m; else lo=m;
    }
    return (hi*100).toFixed(2);
  }
  const reqRate = solveReturnRate();

  // 52세 예상 자산
  function balAt(age) {
    let bal=START_BAL;
    const r=s.return_rate/100;
    for(let a=SIM_AGE0;a<=age;a++){
      bal*=(1+r);
      if(a<=s.retire_age) bal+=s.save_monthly*1e4*12*(1+SIM_SG)**(a-SIM_AGE0);
    }
    return bal;
  }
  const balAt52 = balAt(Math.min(s.retire_age, 52));

  // 65세 월 인출액 (명목)
  const nominalAt65 = s.living_slow*1e4*(1+s.inflation/100)**(2026+24-2024);
  // 연금 커버리지
  const pensionCoverage = Math.round((SIM_PENSION/12) / nominalAt65 * 100);

  document.getElementById('sec-sim').innerHTML = `
    <!-- 결과 카드 -->
    <div style="border-radius:16px;padding:18px;color:#fff;margin-bottom:12px;background:${ok?'linear-gradient(135deg,#0f3d28,#1a7a4c)':'linear-gradient(135deg,#7a2e1e,#b5482e)'}">
      <div style="font-size:12px;opacity:.8">자산 고갈 시점</div>

      ${[52,60,65,70,75,80].map(age=>{

          <span style="font-size:13px;color:#1a2620;font-weight:500">${age}세 (${yr}년)</span>

      ${simSlider('save_monthly','월 저축액',s.save_monthly,'만원',100,1000,10,'')}
      ${simSlider('return_rate','연 수익률',s.return_rate,'%',1,8,0.1,'')}
      ${simSlider('inflation','물가상승률',s.inflation,'%',1.5,4.5,0.1,'현실적 기준: 3.0%')}

    <div class="card">
      <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#1a7a4c;font-weight:700;margin-bottom:12px">노후 생활비 (오늘 구매력)</div>
      ${simSlider('living_active','활동기 ~64세',s.living_active,'만원',250,700,10,'부부 적정 330만보다 여유')}
      ${simSlider('living_slow','둔화기 65~74세',s.living_slow,'만원',200,600,10,'')}
      ${simSlider('living_old','고령기 75세~',s.living_old,'만원',150,500,10,'')}
      ${simSlider('alba','알바 수입 52~64세',s.alba,'만원',0,300,10,'')}
    </div>`;

  // 3개 시나리오 차트
  const deflate = (val, age) => simRealView ? val/Math.pow(1+s.inflation/100, age-SIM_AGE0) : val;
  const ctx = document.getElementById('simCv');
  if(!ctx) return;
  if(simChartObj) simChartObj.destroy();
  simChartObj = new Chart(ctx.getContext('2d'),{
    type:'line',
    data:{
      labels: sim.rows.map(r=>r.age+'세'),
      datasets:[
        {label:'수익률'+(s.return_rate+1).toFixed(0)+'%', data:simHigh.rows.map(r=>parseFloat(deflate(r.bal*1e8,r.age)/1e8).toFixed(2)), borderColor:'#0f3d28', backgroundColor:'transparent', borderWidth:2, pointRadius:2, tension:0.3},
        {label:'현재 '+s.return_rate+'%', data:sim.rows.map(r=>parseFloat(deflate(r.bal*1e8,r.age)/1e8).toFixed(2)), borderColor:'#1a7a4c', backgroundColor:'rgba(26,122,76,0.07)', fill:true, borderWidth:2.4, pointRadius:3, tension:0.3},
        {label:'수익률'+(s.return_rate-1).toFixed(0)+'%', data:simLow.rows.map(r=>parseFloat(deflate(r.bal*1e8,r.age)/1e8).toFixed(2)), borderColor:'#e07a3c', backgroundColor:'transparent', borderWidth:2, borderDash:[4,3], pointRadius:2, tension:0.3},
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y}억`}}},
      scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>v+'억'}}}}
  });

  document.querySelectorAll('.sim-sl').forEach(el=>{
    el.addEventListener('input',e=>{
      simSet[e.target.dataset.k]=parseFloat(e.target.value);
      document.getElementById('sv_'+e.target.dataset.k).textContent=simSet[e.target.dataset.k].toLocaleString('ko-KR');
      renderSim();
    });
  });
}

function simSlider(k,label,val,unit,min,max,step,hint){
  return `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:13px;color:#5a6a60">${label}</span>
      <span style="font-weight:600;color:#0f3d28;font-size:14px"><span id="sv_${k}">${val.toLocaleString('ko-KR')}</span><span style="font-size:11px;color:#9aa89f;margin-left:2px">${unit}</span></span>
    </div>
    <input type="range" class="sim-sl" data-k="${k}" min="${min}" max="${max}" step="${step}" value="${val}" style="width:100%">
    ${hint?`<div style="font-size:11px;color:#9aa89f;margin-top:3px">${hint}</div>`:''}
  </div>`;
}

function drawSimChart(sim){
  const ctx=document.getElementById('simCv');
  if(!ctx) return;
  if(simChartObj) simChartObj.destroy();
  const ok=sim.dep===null;
  simChartObj=new Chart(ctx.getContext('2d'),{
    type:'line',
    data:{labels:sim.rows.map(r=>r.age+'세'),datasets:[{data:sim.rows.map(r=>r.bal),borderColor:ok?'#1a7a4c':'#b5482e',backgroundColor:'transparent',borderWidth:2.4,pointRadius:3,tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y+'억'}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>v+'억'}}}}
  });
}

// ── 추이 화면 ────────────────────────────
let trendMode = 'total';
function renderTrend() {
  const dates = allDates();
  if(!dates.length){document.getElementById('sec-trend').innerHTML='<div class="loading">데이터 없음</div>';return;}
  const labels = dates.map(d=>d.slice(2,7).replace('-','/'));
  const totals = dates.map(totalForDate);
  const nets = dates.map(d=>totalForDate(d)-loanForDate(d));
  const changes = dates.map((d,i)=>i===0?0:totalForDate(d)-totalForDate(dates[i-1]));

  const first=totals[0], last=totals[totals.length-1];
  const pct = (((last-first)/first)*100).toFixed(1);

  let html = `
    <div class="hero">
      <div class="lbl">전체 기간 성장</div>
      <div class="big">+${pct}%</div>
      <div class="row">
        <div class="item"><div class="hl">기간</div><div class="hv">${dates.length-1}개월</div></div>
        <div class="item"><div class="hl">시작</div><div class="hv">${eok(first)}억</div></div>
        <div class="item"><div class="hl">현재</div><div class="hv">${eok(last)}억</div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">총자산 vs 순자산</div>
      <div class="chart-wrap"><canvas id="ch1"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">월별 증가액</div>
      <div class="chart-wrap" style="height:160px"><canvas id="ch2"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">카테고리별 구성 변화</div>
      <div class="chart-wrap"><canvas id="ch3"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">계좌별 상세 추이</div>`;

  // 계좌별 테이블
  const cats = ['cash','investment','pension','stocks','bonds'];
  for(const cat of cats){
    const catAccts = accounts.filter(a=>a.category===cat);
    let hasData = false;
    for(const a of catAccts){
      if(dates.some(d=>(snapshots[d]||{})[a.name]?.amount>0)){hasData=true;break;}
    }
    if(!hasData) continue;
    html += `<div style="font-size:11px;font-weight:700;color:${CAT_COLOR[cat]};margin:10px 0 4px;text-transform:uppercase;letter-spacing:.08em">${CAT_LABEL[cat]}</div>`;
    html += `<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>계좌</th>${labels.map(l=>`<th style="text-align:right;white-space:nowrap">${l}</th>`).join('')}</tr></thead><tbody>`;
    for(const a of catAccts){
      const vals = dates.map(d=>{
        const info=(snapshots[d]||{})[a.name]||{};
        return {amt:+info.amount||0, status:info.status};
      });
      if(vals.every(v=>v.amt===0)) continue;
      html += `<tr><td style="white-space:nowrap;font-weight:500">${a.name}</td>`;
      for(const v of vals){
        const cell = v.amt>0 ? won(v.amt) : (v.status==='만기해지'?'<span style="color:#b5482e;font-size:10px">만기</span>':'-');
        html += `<td style="text-align:right;white-space:nowrap">${cell}</td>`;
      }
      html += `</tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // 월별 요약 테이블
  html += `</div><div class="card"><div class="card-title">월별 요약</div>
    <table class="tbl"><thead><tr><th>날짜</th><th style="text-align:right">총자산</th><th style="text-align:right">순자산</th><th style="text-align:right">전월비</th></tr></thead><tbody>`;
  for(let i=0;i<dates.length;i++){
    const chg = changes[i];
    const chgStr = i===0?'-':(chg>=0?'+':'')+won(chg)+'원';
    const cls = chg>0?'up':chg<0?'dn':'';
    html += `<tr><td>${dates[i].slice(2,10)}</td><td style="text-align:right">${eok(totals[i])}억</td><td style="text-align:right">${eok(nets[i])}억</td><td style="text-align:right" class="${cls}">${chgStr}</td></tr>`;
  }
  html += `</tbody></table></div>`;
  document.getElementById('sec-trend').innerHTML = html;

  // 차트 그리기
  const gc = id => document.getElementById(id)?.getContext('2d');
  const g1=gc('ch1'),g2=gc('ch2'),g3=gc('ch3');
  if(charts.c1) charts.c1.destroy(); if(charts.c2) charts.c2.destroy(); if(charts.c3) charts.c3.destroy();

  if(g1) charts.c1 = new Chart(g1,{type:'line',data:{labels,datasets:[
    {label:'총자산',data:totals.map(v=>+(v/1e8).toFixed(2)),borderColor:'#0f3d28',backgroundColor:'rgba(15,61,40,0.07)',fill:true,borderWidth:2.2,pointRadius:3,tension:0.3},
    {label:'순자산',data:nets.map(v=>+(v/1e8).toFixed(2)),borderColor:'#1a7a4c',backgroundColor:'transparent',borderWidth:2,pointRadius:3,tension:0.3,borderDash:[4,3]},
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y}억`}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>v+'억'}}}}});

  if(g2) charts.c2 = new Chart(g2,{type:'bar',data:{labels:labels.slice(1),datasets:[{data:changes.slice(1).map(v=>Math.round(v/1e4)),backgroundColor:changes.slice(1).map(v=>v>=0?'#1a7a4c':'#b5482e'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toLocaleString()}만원`}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>v+'만'}}}}});

  if(g3){
    const cats3=['cash','investment','pension','stocks','bonds'];
    charts.c3 = new Chart(g3,{type:'bar',data:{labels,datasets:cats3.map(cat=>({label:CAT_LABEL[cat],data:dates.map(d=>Math.round(catTotalForDate(d,cat)/1e4)),backgroundColor:CAT_COLOR[cat],stack:'s',borderWidth:0}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},boxWidth:10,padding:6}}},scales:{x:{ticks:{font:{size:10}},stacked:true},y:{ticks:{font:{size:10},callback:v=>v+'만'},stacked:true}}}});
  }
}

// ── 입력 화면 ────────────────────────────
function renderInput() {
  const dt = latestDate() || new Date().toISOString().slice(0,10);
  const s = snapshots[dt]||{};
  const loan = loanForDate(dt);
  const cats = ['cash','investment','pension','stocks','bonds'];

  let html = `<div class="card"><div class="card-title">기준일</div>
    <input class="inp-field" type="date" id="inp_date" value="${new Date().toISOString().slice(0,10)}" style="margin-bottom:4px" onchange="checkDateMode()"/>
    <div style="font-size:11px;color:#9aa89f">이전 달 데이터를 불러와 수정하거나, 새 날짜로 입력하세요</div>
    <button onclick="loadDateData()" style="margin-top:8px;padding:8px 14px;border:1px solid #1a7a4c;border-radius:8px;background:transparent;color:#1a7a4c;font-size:13px;cursor:pointer">이 날짜 데이터 불러오기</button>
  </div>`;

  // 만기해지 판단: 과거에 만기해지였고 현재 잔액 0인 계좌 숨김
  const isExpired = n => {
    const li=(snapshots[dt]||{})[n]||{};
    if((+li.amount||0)>0) return false;
    return allDates().some(d=>(snapshots[d]||{})[n]?.status==='만기해지');
  };

  for(const cat of cats){
    const catAccts = accounts.filter(a=>a.category===cat && a.active && !isExpired(a.name));
    html += `<div class="cat-hdr">${CAT_LABEL[cat]}</div><div class="card" id="cat_${cat}">`;
    for(const a of catAccts){
      const info = s[a.name]||{};
      const amt = +info.amount||0;
      html += `<div class="inp-group">
        <div class="inp-label">
          <span>${a.name}</span>
          <select class="status-sel" id="status_${encodeURI(a.name)}">
            <option value="active" ${info.status!=='만기해지'?'selected':''}>운용중</option>
            <option value="만기해지" ${info.status==='만기해지'?'selected':''}>만기해지</option>
          </select>
        </div>
        <input class="inp-field" type="number" id="amt_${encodeURI(a.name)}" value="${amt}" placeholder="0" oninput="calcPreview()"/>
      </div>`;
    }
    html += `<button class="add-acct-btn" onclick="addAccount('${cat}')">+ ${CAT_LABEL[cat]} 계좌 추가</button></div>`;
  }

  html += `<div class="cat-hdr">대출</div><div class="card">
    <div class="inp-group"><div class="inp-label"><span>대출 잔액</span></div>
    <input class="inp-field" type="number" id="amt_loan" value="${loan}" oninput="calcPreview()"/>
    </div></div>
    <div class="card">
      <div class="card-title">입력 후 총자산</div>
      <div id="preview" style="font-size:28px;font-weight:600;color:#1a7a4c"></div>
      <div id="preview_net" style="font-size:13px;color:#5a6a60;margin-top:4px"></div>
    </div>
    <button class="save-btn" id="saveBtn" onclick="saveAll()">저장하기</button>
    <div style="height:20px"></div>`;

  document.getElementById('sec-input').innerHTML = html;
  calcPreview();
  checkDateMode();
}

function calcPreview(){
  let tot=0;
  accounts.forEach(a=>{
    const el=document.getElementById('amt_'+encodeURI(a.name));
    if(el) tot+=+(el.value)||0;
  });
  const loan=+(document.getElementById('amt_loan')?.value)||0;
  const p=document.getElementById('preview'), pn=document.getElementById('preview_net');
  if(p) p.textContent=eok(tot)+'억원';
  if(pn) pn.textContent='순자산 '+eok(tot-loan)+'억원';
}

async function loadDateData(){
  const dt=document.getElementById('inp_date').value;
  const s=snapshots[dt]||{};
  const loan=(loans.find(l=>l.snapshot_date===dt)||{}).amount||0;
  accounts.forEach(a=>{
    const el=document.getElementById('amt_'+encodeURI(a.name));
    const sel=document.getElementById('status_'+encodeURI(a.name));
    const info=s[a.name]||{};
    if(el) el.value=+info.amount||0;
    if(sel) sel.value=info.status||'active';
  });
  const lel=document.getElementById('amt_loan');
  if(lel) lel.value=loan;
  calcPreview();
  checkDateMode();
  toast('📥 '+dt+' 데이터 불러옴');
}

function checkDateMode(){
  const dt = document.getElementById('inp_date')?.value;
  if(!dt) return;
  const btn = document.getElementById('saveBtn');
  if(!btn) return;
  const exists = dt in snapshots && Object.keys(snapshots[dt]||{}).length > 0;
  btn.textContent = exists ? '수정하기' : '저장하기';
  btn.style.background = exists ? '#185fa5' : '#0f3d28';
}

async function saveAll(){
  const btn=document.getElementById('saveBtn');
  const dt=document.getElementById('inp_date').value;
  btn.textContent='저장 중…'; btn.disabled=true;
  try {
    // 계좌별 upsert
    const rows=[];
    accounts.forEach(a=>{
      const el=document.getElementById('amt_'+encodeURI(a.name));
      const sel=document.getElementById('status_'+encodeURI(a.name));
      if(el){
        const amt=+(el.value)||0;
        const status=(sel?.value)||'active';
        if(amt>0||status==='만기해지'){
          rows.push({snapshot_date:dt, account_name:a.name, amount:amt, status});
        }
      }
    });
    if(rows.length) await api.upsert('account_snapshots', rows);
    // 대출
    const loanAmt=+(document.getElementById('amt_loan')?.value)||0;
    if(loanAmt>0) await api.upsert('loan_snapshots',[{snapshot_date:dt, amount:loanAmt}]);
    // 상태 업데이트
    if(!snapshots[dt]) snapshots[dt]={};
    rows.forEach(r=>{ snapshots[dt][r.account_name]={amount:r.amount, status:r.status}; });
    const li=loans.findIndex(l=>l.snapshot_date===dt);
    if(li>=0) loans[li].amount=loanAmt; else loans.push({snapshot_date:dt,amount:loanAmt});
    btn.textContent='✓ 저장 완료!'; btn.classList.add('ok');
    toast('💾 저장됐어요!');
    setTimeout(()=>{btn.textContent='저장하기';btn.classList.remove('ok');btn.disabled=false;},2000);
  } catch(e){ btn.textContent='오류 발생'; btn.disabled=false; }
}

async function addAccount(cat){
  const name=prompt('새 계좌 이름을 입력하세요:');
  if(!name||!name.trim()) return;
  const n=name.trim();
  if(accounts.find(a=>a.name===n)){toast('이미 있는 계좌예요'); return;}
  const maxSort=Math.max(0,...accounts.filter(a=>a.category===cat).map(a=>a.sort_order));
  await api.post('accounts_master',[{name:n,category:cat,sort_order:maxSort+1}]);
  accounts.push({name:n,category:cat,active:true,sort_order:maxSort+1});
  renderInput();
  toast('✓ '+n+' 추가됨');
}

// ── 할일 ─────────────────────────────────
const DEFAULT_TODOS=[
  {id:1,text:'TDF2020 전액매도 → TDF2060 교체',done:false,tag:'즉시',color:'#b5482e'},
  {id:2,text:'예금 만기 2,100만 배분 실행',done:false,tag:'즉시',color:'#b5482e'},
  {id:3,text:'연금저축 올해 잔여 565만 납입',done:false,tag:'올해',color:'#caa94a'},
  {id:4,text:'IRP 300만 추가 납입',done:false,tag:'올해',color:'#caa94a'},
  {id:5,text:'개인투자용 국채 20년물 700만',done:false,tag:'올해',color:'#caa94a'},
  {id:6,text:'배당성장 ETF 일반계좌 535만',done:false,tag:'올해',color:'#caa94a'},
  {id:7,text:'증권사 연금저축 개설 후 ETF 직접투자',done:false,tag:'1~2년',color:'#1a7a4c'},
  {id:8,text:'연금저축 연간 600만 납입 유지',done:false,tag:'매년',color:'#1a7a4c'},
];
let todos = [...DEFAULT_TODOS];

function renderTodo(){
  const done=todos.filter(t=>t.done).length;
  const tags=[...new Set(todos.map(t=>t.tag))];
  let html=`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="card-title" style="margin:0">진행 현황</span>
        <span style="font-size:14px;font-weight:600;color:#1a7a4c">${done}/${todos.length}</span>
      </div>
      <div class="progress-bar" style="height:7px"><div class="progress-fill" style="width:${todos.length?((done/todos.length)*100).toFixed(0):0}%"></div></div>
    </div>
    <button onclick="showAddTodo()" style="width:100%;padding:12px;border:1.5px dashed #1a7a4c;border-radius:12px;background:transparent;color:#1a7a4c;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:12px">+ 할일 직접 추가</button>
    <button onclick="runAIAnalysis()" id="aiBtn" style="width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#0f3d28,#1a7a4c);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:14px">🤖 AI 자산 분석 → 할일 제안</button>
    <div id="aiResult"></div>`;
  for(const tag of tags){
    html+=`<div class="tag-lbl">${tag}</div><div class="card">`;
    for(const t of todos.filter(x=>x.tag===tag)){
      html+=`<div class="todo-row">
        <div class="chk ${t.done?'done':''}" onclick="toggleTodo(${t.id})">${t.done?'✓':''}</div>
        <div class="todo-txt ${t.done?'done':''}" onclick="toggleTodo(${t.id})">${t.text}</div>
        <button onclick="deleteTodo(${t.id})" style="border:none;background:none;color:#ccc;font-size:18px;cursor:pointer;padding:0 4px;flex-shrink:0">×</button>
      </div>`;
    }
    html+=`</div>`;
  }
  document.getElementById('sec-todo').innerHTML=html;
}

function showAddTodo(){
  const tag=prompt('태그를 선택하세요 (즉시/올해/1~2년/매년):','올해');
  if(!tag) return;
  const text=prompt('할일 내용:');
  if(!text||!text.trim()) return;
  addTodo(text.trim(), tag.trim());
}

async function addTodo(text, tag='올해', color='#1a7a4c'){
  const maxSort=Math.max(0,...todos.map(t=>t.sort_order||0));
  const newTodo={text, done:false, tag, color, sort_order:maxSort+1};
  try {
    const res=await api.post('action_items',[newTodo]);
    todos.push(res[0]||{...newTodo,id:Date.now()});
    renderTodo(); toast('✓ 추가됐어요!');
  } catch(e){ console.error(e); }
}

async function toggleTodo(id){
  const t=todos.find(x=>x.id===id); if(!t)return;
  t.done=!t.done;
  try { await api.patch('action_items','id=eq.'+id,{done:t.done}); } catch(e){}
  renderTodo(); if(t.done)toast('✓ 완료!');
}

async function deleteTodo(id){
  if(!confirm('삭제할까요?')) return;
  todos=todos.filter(t=>t.id!==id);
  try { await api.del('action_items','id=eq.'+id); } catch(e){}
  renderTodo(); toast('삭제됐어요');
}

// ── AI 분석 ───────────────────────────────
async function runAIAnalysis(){
  const btn=document.getElementById('aiBtn');
  const res=document.getElementById('aiResult');
  if(!btn||!res) return;
  btn.textContent='🤖 분석 중...'; btn.disabled=true;
  res.innerHTML=`<div class="card" style="text-align:center;color:#5a6a60;font-size:13px">AI가 자산을 분석하고 있어요...<br><small>10~15초 소요됩니다</small></div>`;

  try {
    // 최신 2개월 데이터 준비
    const dates=allDates();
    const lastDt=dates[dates.length-1];
    const prevDt=dates.length>1?dates[dates.length-2]:null;
    const lastSnap=snapshots[lastDt]||{};
    const prevSnap=prevDt?(snapshots[prevDt]||{}):null;

    // 계좌별 데이터 정리
    const acctLines=[];
    for(const cat of ['cash','investment','pension','stocks','bonds']){
      const catAccts=accounts.filter(a=>a.category===cat);
      for(const a of catAccts){
        const cur=(+((lastSnap[a.name]||{}).amount)||0);
        const prev=prevSnap?(+((prevSnap[a.name]||{}).amount)||0):0;
        if(cur!==0||prev!==0){
          const chg=cur-prev;
          const line=`${a.name}(${CAT_LABEL[cat]}): ${(cur/1e4).toFixed(0)}만원${chg!==0?' ('+( chg>0?'+':'')+Math.round(chg/1e4)+'만)':''}`;
          acctLines.push(line);
        }
      }
    }
    const tot=totalForDate(lastDt);
    const loan=loanForDate(lastDt);
    const net=tot-loan;
    const prevTot=prevDt?totalForDate(prevDt):0;
    const monthChg=prevTot?(tot-prevTot):0;

    const pendingTodos = todos.filter(t=>!t.done).map(t=>'- '+t.text).join('\n') || '없음';
    const prompt = '당신은 개인 자산관리 전문가입니다. 아래는 한국의 41세 수학학원 원장의 ' + lastDt + ' 기준 자산 현황입니다.\n\n' +
      '총자산: ' + (tot/1e8).toFixed(2) + '억원\n' +
      '순자산: ' + (net/1e8).toFixed(2) + '억원\n' +
      '대출: ' + (loan/1e8).toFixed(2) + '억원\n' +
      '전월 대비: ' + (monthChg>0?'+':'') + Math.round(monthChg/1e4) + '만원\n\n' +
      '계좌별 상세 (현재금액, 괄호는 전월대비):\n' +
      acctLines.join('\n') + '\n\n' +
      '현재 진행 중인 할일:\n' + pendingTodos + '\n\n' +
      '위 자산을 분석해서 지금 해야 할 재무 액션 3~5개를 제안해주세요.\n' +
      '반드시 아래 JSON 배열 형식으로만 응답하고 다른 텍스트는 쓰지 마세요:\n' +
      '[{"text":"할일 내용","tag":"즉시","reason":"이유"}]';

    const apiRes=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        messages:[{role:'user',content:prompt}]
      })
    });
    const apiData=await apiRes.json();
    const raw=apiData.content?.[0]?.text||'[]';
    const cleaned=raw.replace(/```json|```/g,'').trim();
    const suggestions=JSON.parse(cleaned);

    // 제안 UI 렌더
    const colors={'즉시':'#b5482e','올해':'#caa94a','1~2년':'#1a7a4c','매년':'#0f3d28'};
    let html=`<div class="card">
      <div class="card-title">🤖 AI 제안 할일</div>`;
    suggestions.forEach((s,i)=>{
      const col=colors[s.tag]||'#1a7a4c';
      html+=`<div style="padding:10px 0;border-bottom:.5px solid #e3ddd0">
        <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:4px">
          <span style="font-size:10px;background:${col};color:#fff;padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:2px">${s.tag}</span>
          <span style="font-size:13.5px;line-height:1.4">${s.text}</span>
        </div>
        <div style="font-size:11.5px;color:#5a6a60;margin-bottom:8px;padding-left:4px">${s.reason}</div>
        <button onclick="approveSuggestion(${i})" style="padding:6px 14px;border:1px solid #1a7a4c;border-radius:8px;background:transparent;color:#1a7a4c;font-size:12px;cursor:pointer">+ 할일에 추가</button>
      </div>`;
    });
    html+=`</div>`;
    res.innerHTML=html;
    window._aiSuggestions=suggestions;
    btn.textContent='🤖 AI 자산 분석 → 할일 제안'; btn.disabled=false;

  } catch(e){
    console.error(e);
    res.innerHTML=`<div class="card" style="color:#b5482e;font-size:13px">분석 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.</div>`;
    btn.textContent='🤖 AI 자산 분석 → 할일 제안'; btn.disabled=false;
  }
}

async function approveSuggestion(i){
  const s=window._aiSuggestions?.[i];
  if(!s) return;
  const colors={'즉시':'#b5482e','올해':'#caa94a','1~2년':'#1a7a4c','매년':'#0f3d28'};
  await addTodo(s.text, s.tag, colors[s.tag]||'#1a7a4c');
}
